    <style>
        body { background: linear-gradient(135deg, #F0F4F8 0%, #e0eafc 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); }
        .glass-card { background: rgba(255, 255, 255, 0.8); transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.4); }
        .glass-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 80, 158, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #00509E 0%, #00A8E8 100%); color: white; box-shadow: 0 4px 15px rgba(0, 80, 158, 0.3); }
        .btn-primary:active { transform: scale(0.96); }
        .input-field { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 80, 158, 0.2); transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #00A8E8; box-shadow: 0 0 0 3px rgba(0, 168, 232, 0.2); background: white; }
        .hidden-page { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #00509E; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .safe-area-pb { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        table tr:nth-child(even) { background-color: #f8fafc; }
        .table-container { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-x-hidden">

    <!-- Loading Screen -->

    <!-- Splash Screen -->

    <!-- Login Page -->
    <div id="login-page" class="hidden-page min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden fade-in">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-secondary/20 rounded-full blur-xl"></div>
            <div class="relative z-10 text-center mb-8">

    <!-- Main App -->

        <!-- Header -->
        <header class="glass-panel sticky top-0 z-40 px-4 py-3 mb-4 flex items-center justify-between rounded-b-2xl mx-2 mt-2 md:mx-4 md:rounded-2xl">
            <div class="flex items-center gap-3">
                <img src="" id="header-logo" class="w-10 h-10 rounded-lg shadow-md bg-white object-cover">
                <div>
                    <h1 id="header-title" class="font-bold text-primary text-base leading-tight">TIRTA KENCANA</h1>
                    <p id="user-display" class="text-xs text-secondary font-medium capitalize"></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="app.syncData()" class="p-2 rounded-xl hover:bg-white/50 text-primary relative" title="Sync Data">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-5 h-5"></i>
                    <span id="sync-indicator" class="absolute top-1 right-1 w-2 h-2 bg-green-500 rounded-full hidden"></span>
                </button>
                <button onclick="app.logout()" class="p-2 rounded-xl hover:bg-red-100 text-red-500">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <main class="px-2 md:px-4 max-w-7xl mx-auto">
            <!-- Dashboard View -->
            <div id="view-dashboard" class="fade-in space-y-6">
                <!-- Stats Cards -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                    <div class="glass-card p-4 rounded-2xl">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="p-2 bg-green-100 rounded-lg text-green-600"><i data-lucide="banknote" class="w-5 h-5"></i></div>

                    </div>
                    <div class="glass-card p-4 rounded-2xl">
                        <div class="flex items-center gap-2 mb-2">

                    </div>

                        <div class="flex items-center gap-2 mb-2">

                            <span class="text-xs font-medium text-gray-500">QRIS</span>

                    </div>

                <!-- Quick Actions -->
                <div class="glass-panel p-4 rounded-2xl">
                    <h3 class="font-bold text-primary mb-3 flex items-center gap-2"><i data-lucide="zap" class="w-4 h-4"></i> Aksi Cepat</h3>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="app.nav('sales')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/60">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white shadow-md"><i data-lucide="shopping-cart" class="w-5 h-5"></i></div>
                            <span class="text-[10px] md:text-xs font-medium">Jual</span>
                        </button>
                        <button onclick="app.nav('purchase')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/60">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center text-white shadow-md"><i data-lucide="truck" class="w-5 h-5"></i></div>
                            <span class="text-[10px] md:text-xs font-medium">Beli</span>
                        </button>
                        <button onclick="app.nav('products')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/60">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-purple-400 to-purple-600 flex items-center justify-center text-white shadow-md"><i data-lucide="package" class="w-5 h-5"></i></div>
                            <span class="text-[10px] md:text-xs font-medium">Produk</span>
                        </button>
                        <button onclick="app.nav('stock')" class="flex flex-col items-center gap-1 p-2 rounded-xl hover:bg-white/60">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-white shadow-md"><i data-lucide="boxes" class="w-5 h-5"></i></div>
                            <span class="text-[10px] md:text-xs font-medium">Stok</span>
                        </button>
                    </div>
                </div>

                <!-- Menu Grid -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4" id="menu-grid"></div>
            </div>

            <!-- Page Container -->
            <div id="page-container" class="hidden-page fade-in space-y-4 pb-20">
                <div class="glass-panel p-4 md:p-6 rounded-2xl min-h-[60vh]">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <button onclick="app.nav('dashboard')" class="p-2 hover:bg-white/50 rounded-lg"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>

                            <button onclick="app.pushData()" class="px-3 py-1.5 text-xs bg-green-100 text-green-700 rounded-lg hover:bg-green-200 flex items-center gap-1">
                                <i data-lucide="upload" class="w-3 h-3"></i> Push

        <!-- Bottom Nav (Mobile) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 glass-panel border-t border-white/50 px-4 py-2 flex justify-around z-50 safe-area-pb">
            <button onclick="app.nav('dashboard')" class="flex flex-col items-center p-2 text-primary"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px]">Home</span></button>
            <button onclick="app.nav('sales')" class="flex flex-col items-center p-2 text-gray-500"><i data-lucide="shopping-cart" class="w-6 h-6"></i><span class="text-[10px]">Jual</span></button>
            <button onclick="app.nav('reports-sales')" class="flex flex-col items-center p-2 text-gray-500"><i data-lucide="bar-chart-2" class="w-6 h-6"></i><span class="text-[10px]">Laporan</span></button>
            <button onclick="app.nav('settings')" class="flex flex-col items-center p-2 text-gray-500"><i data-lucide="settings" class="w-6 h-6"></i><span class="text-[10px]">Setting</span></button>
        </nav>

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden-page flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all scale-100">
            <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                <h3 id="modal-title" class="font-bold text-lg text-primary">Modal Title</h3>
                <button onclick="app.closeModal()" class="p-1 hover:bg-gray-100 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="modal-body" class="p-4"></div>
        </div>
    </div>

        <script>
        // --- KONFIGURASI ---
        const CONFIG = {
            sheetsId: '1OrMEuqOo9JF9i29et8c5rhSyoKsrjzVnxxZEbOyIxfQ',
            gasUrl: 'https://script.google.com/macros/s/AKfycbzWwDCMaFj_Gj_Wfs9ypU0xrwnUMi-AElRCFYC0yxuKMrXm2avvtQ12HfBAh6duzQPaew/exec',
            storeName: 'TIRTA KENCANA',
            tagline: 'DO GOOD AND GOD WILL COME TO YOU',
            logo: 'https://placehold.co/100x100', 
            qris: 'https://placehold.co/100x100'
        };

        // --- DATABASE LOCAL ---
        const DB = {
            users: [
                { name: 'admin', role: 'admin', pass: '020730' },
                { name: 'tirta', role: 'admin', pass: '888999' },
                { name: 'hasan', role: 'sales', pass: '1234' },
                { name: 'ujang', role: 'sales', pass: '1234' },
                { name: 'oji', role: 'driver', pass: '1234' },
                { name: 'padong', role: 'driver', pass: '1234' }
            ],
            products: [], customers: [], sales: [], purchases: [], stock: [], debt: [], setoran: [], drivers: [], settings: { ...CONFIG }
        };

        // --- APLIKASI UTAMA ---
        const app = {
            currentUser: null,
            currentPage: 'dashboard',
            cart: [],
            purchaseCart: [],
            syncInterval: null,
            calculatedSetoran: null,

            init() {
                lucide.createIcons();
                this.applySettings();
                this.checkAuth();
                this.syncInterval = setInterval(() => { if (this.currentUser) this.syncData(true); }, 900000); // 15 Menit
            },

            applySettings() {
                const s = DB.settings;
                document.getElementById('splash-logo').src = s.logo || CONFIG.logo;
                document.getElementById('splash-title').textContent = s.storeName || CONFIG.storeName;
                document.getElementById('splash-subtitle').textContent = s.tagline || CONFIG.tagline;
                document.getElementById('login-logo').src = s.logo || CONFIG.logo;
                document.getElementById('header-logo').src = s.logo || CONFIG.logo;
                document.getElementById('header-title').textContent = s.storeName || CONFIG.storeName;
            },

            checkAuth() {
                const savedUser = localStorage.getItem('tk_user');
                if (savedUser) {
                    this.currentUser = JSON.parse(savedUser);
                    this.showMainApp();
                } else {
                    setTimeout(() => {
                        document.getElementById('splash-screen').classList.add('hidden-page');
                        document.getElementById('login-page').classList.remove('hidden-page');
                    }, 2000);
                }
            },

            login(user) {
                this.currentUser = user;
                localStorage.setItem('tk_user', JSON.stringify(user));
                document.getElementById('login-page').classList.add('hidden-page');
                this.showMainApp();
            },

            logout() {
                if (confirm('Keluar dari aplikasi?')) {
                    localStorage.removeItem('tk_user');
                    location.reload();
                }
            },

            showMainApp() {
                document.getElementById('main-app').classList.remove('hidden-page');
                document.getElementById('user-display').textContent = `${this.currentUser.name} (${this.currentUser.role})`;
                this.renderMenu();
                this.nav('dashboard');
                this.syncData(); 
            },

            renderMenu() {
                const role = this.currentUser.role;
                const menuGrid = document.getElementById('menu-grid');
                menuGrid.innerHTML = '';
                const menus = [
                    { id: 'sales', label: 'Penjualan', icon: 'shopping-cart', roles: ['admin', 'sales'] },
                    { id: 'transactions', label: 'Transaksi', icon: 'receipt', roles: ['admin', 'sales'] },
                    { id: 'reports-sales', label: 'Rekap Penjualan', icon: 'bar-chart-3', roles: ['admin', 'sales'] },
                    { id: 'setoran', label: 'Setoran', icon: 'wallet', roles: ['admin', 'sales'] },
                    { id: 'reports-setoran', label: 'Rekap Setoran', icon: 'file-text', roles: ['admin', 'sales'] },
                    { id: 'purchase', label: 'Pembelian', icon: 'truck', roles: ['admin', 'driver'] },
                    { id: 'reports-purchase', label: 'Rekap Pembelian', icon: 'file-text', roles: ['admin', 'driver'] },
                    { id: 'products', label: 'Produk', icon: 'package', roles: ['admin'] },
                    { id: 'stock', label: 'Stok', icon: 'boxes', roles: ['admin'] },
                    { id: 'customers', label: 'Pelanggan', icon: 'users', roles: ['admin'] },
                    { id: 'debt', label: 'Piutang', icon: 'hand-coins', roles: ['admin'] },
                    { id: 'reports-monthly', label: 'Laporan Bulanan', icon: 'calendar', roles: ['admin'] },
                    { id: 'settings', label: 'Pengaturan', icon: 'settings', roles: ['admin', 'sales', 'driver'] },
                    { id: 'graphs', label: 'Grafik', icon: 'pie-chart', roles: ['admin', 'sales'] },
                    { id: 'audit', label: 'Audit Log', icon: 'shield-check', roles: ['admin'] }
                ];
                menus.forEach(m => {
                    if (m.roles.includes(role)) {
                        const div = document.createElement('div');
                        div.className = 'glass-card p-4 rounded-2xl cursor-pointer group';
                        div.onclick = () => this.nav(m.id);
                        div.innerHTML = `<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center mb-3 group-hover:bg-primary/20 transition-colors"><i data-lucide="${m.icon}" class="w-6 h-6 text-primary"></i></div><h3 class="font-semibold text-gray-800">${m.label}</h3><p class="text-xs text-gray-500 mt-1">Kelola ${m.label.toLowerCase()}</p>`;
                        menuGrid.appendChild(div);
                    }
                });
                lucide.createIcons();
            },

            nav(pageId) {
                this.currentPage = pageId;
                document.getElementById('view-dashboard').classList.add('hidden-page');
                document.getElementById('page-container').classList.add('hidden-page');
                if (pageId === 'dashboard') {
                    document.getElementById('view-dashboard').classList.remove('hidden-page');
                    this.updateDashboardStats();
                    return;
                }
                const container = document.getElementById('page-container');
                container.classList.remove('hidden-page');
                document.getElementById('page-title').textContent = pageId.replace('-', ' ').toUpperCase();
                document.getElementById('page-content').innerHTML = '<div class="flex justify-center p-10"><div class="spinner"></div></div>';
                setTimeout(() => {
                    switch (pageId) {
                        case 'sales': this.renderSales(); break;
                        case 'transactions': this.renderTransactions(); break;
                        case 'reports-sales': this.renderReports('sales'); break;
                        case 'setoran': this.renderSetoran(); break;
                        case 'reports-setoran': this.renderReports('setoran'); break;
                        case 'purchase': this.renderPurchase(); break;
                        case 'reports-purchase': this.renderReports('purchase'); break;
                        case 'products': this.renderProducts(); break;
                        case 'stock': this.renderStock(); break;
                        case 'customers': this.renderCustomers(); break;
                        case 'debt': this.renderDebt(); break;
                        case 'reports-monthly': this.renderMonthlyReport(); break;
                        case 'settings': this.renderSettings(); break;
                        case 'graphs': this.renderGraphs(); break;
                        case 'audit': this.renderAudit(); break;
                        default: document.getElementById('page-content').innerHTML = '<p class="text-center text-gray-500">Fitur sedang dikembangkan</p>';
                    }
                    lucide.createIcons();
                }, 100);
            },

            // --- CORE SYNC & API ---
            async syncData(silent = false) {
                if (!silent) this.showLoading('Sinkronisasi Data...');
                try {
                    const res = await this.apiCall('getAllData');
                    const syncedData = res.data;
                    Object.keys(syncedData).forEach(key => {
                        if (Array.isArray(syncedData[key])) DB[key] = syncedData[key];
                        else if (key === 'Settings') Object.assign(DB.settings, syncedData[key]);
                    });
                    this.applySettings();
                    document.getElementById('sync-indicator').classList.remove('hidden');
                    setTimeout(() => document.getElementById('sync-indicator').classList.add('hidden'), 3000);
                    if (!silent) alert('Data berhasil disinkronisasi!');
                    if (this.currentPage !== 'dashboard') this.nav(this.currentPage);
                    else this.updateDashboardStats();
                } catch (e) {
                    console.error(e);
                    if (!silent) alert('Gagal sinkronisasi: ' + e.message);
                } finally {
                    if (!silent) this.hideLoading();
                }
            },
            async pushData() { alert('Fitur Push Manual: Data lokal akan dikirim ke Google Sheets.'); await this.syncData(); },
            async apiCall(action, payload) {
                const fullPayload = { action, ...payload };
                try {
                    const res = await fetch(CONFIG.gasUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fullPayload) });
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const data = await res.json();
                    if (data.status !== 'success') throw new Error(data.message || 'API error');
                    return data;
                } catch (e) { console.error('API Call Error:', e); throw e; }
            },
            showLoading(msg) { document.getElementById('loading-text').textContent = msg; document.getElementById('loading-screen').classList.remove('hidden-page'); },
            hideLoading() { document.getElementById('loading-screen').classList.add('hidden-page'); },

                todaySales.forEach(s => { if (stats[s.status] !== undefined) stats[s.status] += (parseFloat(s.net) || 0); });

                document.getElementById('dash-transfer').textContent = 'Rp ' + stats.transfer.toLocaleString();

                lucide.createIcons();

            addItemToCart() {
                const input = document.getElementById('scan-input');
                const val = input.value.trim();
                if(!val) return;
                const product = DB.products.find(p => p.sku === val || p.barcode === val);
                if(product) {
                    const idx = this.cart.findIndex(i => i.sku === val);
                    if(idx > -1) this.cart[idx].qty++;
                    else this.cart.push({...product, qty: 1, disc: 0});
                    input.value = '';
                    this.renderCart();
                } else alert('Produk tidak ditemukan');
            },
            renderCart() {
                const tbody = document.getElementById('cart-body');
                if(!tbody) return;
                tbody.innerHTML = this.cart.map((item, idx) => `
                    <tr class="border-b"><td class="p-3"><div class="font-bold">${item.name}</div><div class="text-xs text-gray-500">${item.sku}</div></td>
                    <td class="p-3"><input type="number" value="${item.qty}" onchange="app.updateCartQty(${idx}, this.value)" class="w-16 p-1 border rounded text-center"></td>
                    <td class="p-3"><input type="number" value="${item.disc||0}" onchange="app.updateCartDisc(${idx}, this.value)" class="w-16 p-1 border rounded text-center"></td>
                    <td class="p-3 font-bold">${((item.price - (item.disc||0)) * item.qty).toLocaleString()}</td>
                    <td class="p-3"><button onclick="app.removeFromCart(${idx})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>
                `).join('');

                lucide.createIcons();

            updateCartQty(idx, v) { this.cart[idx].qty = parseInt(v)||0; this.renderCart(); },
            updateCartDisc(idx, v) { this.cart[idx].disc = parseFloat(v)||0; this.renderCart(); },
            removeFromCart(idx) { this.cart.splice(idx, 1); this.renderCart(); },
            resetCart() { this.cart = []; this.renderCart(); },
            calcTotal() {
                let gross = 0, totalDisc = 0;
                this.cart.forEach(i => { gross += i.price*i.qty; totalDisc += (i.disc||0)*i.qty; });
                const add = parseFloat(document.getElementById('sum-additional')?.value||0);
                const net = gross - totalDisc + add;
                document.getElementById('sum-gross').textContent = gross.toLocaleString();
                document.getElementById('sum-disc').textContent = totalDisc.toLocaleString();
                document.getElementById('sum-net').textContent = net.toLocaleString();
                return { gross, totalDisc, add, net };
            },
            async saveSale() {
                if(this.cart.length===0) return alert('Keranjang kosong');

                    this.nav('dashboard');

            },
            saveSettings() {
                const newSet = { storeName: document.getElementById('set-name').value, tagline: document.getElementById('set-tag').value, address: document.getElementById('set-addr').value };
                Object.assign(DB.settings, newSet);
                this.apiCall('updateSettings', newSet);
                this.applySettings();
                alert('Pengaturan disimpan');
            },
            backupData() {
                const blob = new Blob([JSON.stringify(DB)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "backup_tirta.json"; a.click();
            },
            restoreData(input) {
                const file = input.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => { const data = JSON.parse(e.target.result); Object.assign(DB, data); alert('Restore berhasil. Refresh halaman.'); };
                reader.readAsText(file);
            },
            
            // UTILS CETAK
            printReceiptById(id) {
                const t = DB.sales.find(x=>x.id===id);
                if(!t) return;
                const w = window.open('', '_blank');
                w.document.write(`<html><head><title>Struk ${t.id}</title><style>body{font-family:monospace;width:80mm;margin:0 auto;padding:10px;} .center{text-align:center;}</style></head><body><div class="center"><h3>${DB.settings.storeName}</h3><p>${t.date}</p></div><hr><table style="width:100%">${t.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price*i.qty}</td></tr>`).join('')}</table><hr><div class="center"><p>Total: Rp ${t.net.toLocaleString()}</p><p>Terima Kasih</p></div><script>window.print();<\/script></body></html>`);
            }
        };

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => app.init());
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const user = DB.users.find(x => x.name === u && x.pass === p);
            if (user) app.login(user);
            else { const err = document.getElementById('login-error'); err.textContent = 'Username/Password salah!'; err.classList.remove('hidden'); }
        });
    </script>
</body>
