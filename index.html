<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tirta Kencana POS - Full Version</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00509E', secondary: '#00A8E8', accent: '#00D1FF', background: '#F0F4F8'
                    },
                    animation: { 'float': 'float 6s ease-in-out infinite', 'fade-in': 'fadeIn 0.5s ease-out' },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #F0F4F8 0%, #e0eafc 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); }
        .glass-card { background: rgba(255, 255, 255, 0.8); transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.4); }
        .glass-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 80, 158, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #00509E 0%, #00A8E8 100%); color: white; box-shadow: 0 4px 15px rgba(0, 80, 158, 0.3); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.96); }
        .input-field { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 80, 158, 0.2); transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #00A8E8; box-shadow: 0 0 0 3px rgba(0, 168, 232, 0.2); }
        .hidden-page { display: none; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 60; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        
        /* Struk Style */
        #receipt-preview { font-family: 'Courier New', monospace; width: 300px; background: white; padding: 20px; margin: 0 auto; }
    </style>
</head>
<body class="text-gray-800 overflow-x-hidden">

    <!-- Loading Overlay -->
    <div id="loading" class="hidden-page loading-overlay flex-col gap-3">
        <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
        <p class="font-semibold text-primary animate-pulse">Memproses Data...</p>
    </div>

    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-primary to-secondary">
        <img src="https://www.image2url.com/r2/default/images/1781919958885-4a0fd859-0e6f-4e9f-9370-702fbf72864f.jpg" class="w-32 h-32 rounded-2xl shadow-2xl border-4 border-white/30 mb-4 animate-fade-in">
        <h1 class="text-3xl font-bold text-white tracking-wider">TIRTA KENCANA</h1>
        <p class="text-white/90 text-xs mt-2 italic">DO GOOD AND GOD WILL COME TO YOU</p>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="hidden-page min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-secondary/20 rounded-full animate-float"></div>
            <div class="relative z-10">
                <div class="text-center mb-6">
                    <img src="https://www.image2url.com/r2/default/images/1781919958885-4a0fd859-0e6f-4e9f-9370-702fbf72864f.jpg" class="w-20 h-20 mx-auto rounded-xl shadow-md mb-3">
                    <h2 class="text-2xl font-bold text-primary">Masuk Aplikasi</h2>
                </div>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="text-sm font-medium text-gray-600">Username</label>
                        <input type="text" id="username" class="input-field w-full p-3 rounded-xl" placeholder="admin / sales / driver" required>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-600">Password</label>
                        <input type="password" id="password" class="input-field w-full p-3 rounded-xl" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn-primary w-full py-3 rounded-xl font-bold shadow-lg">MASUK</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden-page pb-24">
        <!-- Header -->
        <header class="glass-panel sticky top-0 z-40 px-4 py-3 flex justify-between items-center mb-4 rounded-b-2xl">
            <div class="flex items-center gap-2">
                <img src="https://www.image2url.com/r2/default/images/1781919958885-4a0fd859-0e6f-4e9f-9370-702fbf72864f.jpg" class="w-8 h-8 rounded-lg">
                <div>
                    <h1 class="font-bold text-primary text-sm leading-tight">TIRTA KENCANA</h1>
                    <p id="user-display" class="text-[10px] text-secondary font-bold uppercase"></p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="app.syncData()" class="p-2 bg-white/50 rounded-full hover:bg-white text-primary"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                <button onclick="app.logout()" class="p-2 bg-red-50 rounded-full hover:bg-red-100 text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <!-- Dashboard View -->
        <div id="view-dashboard" class="page-view space-y-6 px-4">
            <!-- Summary Cards -->
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-card p-3 rounded-2xl bg-green-50/50">
                    <p class="text-xs text-gray-500">Penjualan Hari Ini</p>
                    <p id="dash-total-sales" class="text-lg font-bold text-gray-800">Rp 0</p>
                </div>
                <div class="glass-card p-3 rounded-2xl bg-orange-50/50">
                    <p class="text-xs text-gray-500">Belum Bayar</p>
                    <p id="dash-pending" class="text-lg font-bold text-orange-600">Rp 0</p>
                </div>
            </div>

            <!-- Quick Actions Grid -->
            <div class="grid grid-cols-4 gap-3" id="menu-grid">
                <!-- Generated by JS based on Role -->
            </div>

            <!-- Recent Activity Placeholder -->
            <div class="glass-panel p-4 rounded-2xl">
                <h3 class="font-bold text-primary mb-2">Aktivitas Terakhir</h3>
                <div id="recent-activity" class="space-y-2 text-sm text-gray-600">
                    <p class="text-center italic">Memuat data...</p>
                </div>
            </div>
        </div>

        <!-- Dynamic Page Container -->
        <div id="view-page" class="page-view hidden-page px-4 space-y-4">
            <div class="flex items-center gap-3 mb-2">
                <button onclick="app.nav('dashboard')" class="p-2 bg-white rounded-full shadow-sm"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h2 id="page-title" class="text-xl font-bold text-primary"></h2>
            </div>
            <div id="page-content" class="glass-panel p-4 rounded-2xl min-h-[60vh]"></div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- KONFIGURASI & STATE ---
        const CONFIG = {
            sheetsId: '1OrMEuqOo9JF9i29et8c5rhSyoKsrjzVnxxZEbOyIxfQ',
            gasUrl: 'https://script.google.com/macros/s/AKfycbzWwDCMaFj_Gj_Wfs9ypU0xrwnUMi-AElRCFYC0yxuKMrXm2avvtQ12HfBAh6duzQPaew/exec'
        };

        const USERS = [
            { nama: 'admin', role: 'admin', pass: '020730' }, { nama: 'tirta', role: 'admin', pass: '888999' },
            { nama: 'hasan', role: 'sales', pass: '1234' }, { nama: 'ujang', role: 'sales', pass: '1234' },
            { nama: 'oji', role: 'driver', pass: '1234' }, { nama: 'padong', role: 'driver', pass: '1234' }
        ];

        const MENUS = {
            admin: ['penjualan', 'transaksi', 'rekap-penjualan', 'pembelian', 'rekap-pembelian', 'produk', 'stock', 'pelanggan', 'piutang', 'setoran', 'rekap-setoran', 'laporan', 'setting'],
            sales: ['penjualan', 'transaksi', 'rekap-penjualan', 'setoran', 'rekap-setoran', 'pelanggan', 'setting'],
            driver: ['pembelian', 'rekap-pembelian', 'produk', 'stock', 'setting']
        };

        let state = {
            user: null,
            data: { products: [], customers: [], sales: [], purchases: [], stock: [], debt: [], settings: {} },
            cart: []
        };

        // --- CORE APP LOGIC ---
        const app = {
            init: () => {
                setTimeout(() => {
                    document.getElementById('splash').classList.add('hidden');
                    document.getElementById('login-page').classList.remove('hidden-page');
                    lucide.createIcons();
                }, 2000);

                document.getElementById('login-form').addEventListener('submit', app.handleLogin);
            },

            handleLogin: (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const user = USERS.find(x => x.nama === u && x.pass === p);

                if (user) {
                    state.user = user;
                    document.getElementById('login-page').classList.add('hidden-page');
                    document.getElementById('main-app').classList.remove('hidden-page');
                    document.getElementById('user-display').innerText = `${user.nama} (${user.role})`;
                    app.renderMenu();
                    app.syncData(); // Auto sync on login
                } else {
                    Swal.fire('Error', 'Username atau Password salah!', 'error');
                }
            },

            logout: () => {
                if(confirm('Keluar aplikasi?')) location.reload();
            },

            renderMenu: () => {
                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '';
                const allowed = MENUS[state.user.role] || [];
                
                const icons = {
                    'penjualan': 'shopping-cart', 'transaksi': 'receipt', 'rekap-penjualan': 'bar-chart',
                    'pembelian': 'truck', 'rekap-pembelian': 'file-text', 'produk': 'package',
                    'stock': 'boxes', 'pelanggan': 'users', 'piutang': 'hand-coins',
                    'setoran': 'wallet', 'rekap-setoran': 'clipboard-list', 'laporan': 'pie-chart', 'setting': 'settings'
                };

                const labels = {
                    'penjualan': 'Jual', 'transaksi': 'Transaksi', 'rekap-penjualan': 'Laporan Jual',
                    'pembelian': 'Beli', 'rekap-pembelian': 'Laporan Beli', 'produk': 'Produk',
                    'stock': 'Stok', 'pelanggan': 'Pelanggan', 'piutang': 'Piutang',
                    'setoran': 'Setor', 'rekap-setoran': 'Rekap Setor', 'laporan': 'Grafik', 'setting': 'Setting'
                };

                allowed.forEach(key => {
                    const div = document.createElement('div');
                    div.className = 'glass-card p-3 rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer active:scale-95 transition-transform';
                    div.onclick = () => app.nav(key);
                    div.innerHTML = `
                        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                            <i data-lucide="${icons[key] || 'circle'}" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-bold text-center leading-tight">${labels[key]}</span>
                    `;
                    grid.appendChild(div);
                });
                lucide.createIcons();
            },

            nav: (page) => {
                document.getElementById('view-dashboard').classList.add('hidden-page');
                document.getElementById('view-page').classList.remove('hidden-page');
                document.getElementById('page-title').innerText = page.replace('-', ' ').toUpperCase();
                
                const content = document.getElementById('page-content');
                content.innerHTML = '<div class="text-center py-10"><div class="spinner"></div><p>Memuat...</p></div>';
                
                app.loadPageContent(page, content);
            },

            loadPageContent: async (page, container) => {
                // Render Forms based on Page
                let html = '';
                
                if (page === 'penjualan') {
                    html = app.forms.penjualan();
                } else if (page === 'produk') {
                    html = app.forms.produk();
                    await app.renderTable('products', container, ['sku', 'nama_barang', 'harga_jual'], 'Produk');
                    return; 
                } else if (page === 'pelanggan') {
                    html = app.forms.pelanggan();
                    await app.renderTable('customers', container, ['nama', 'alamat', 'no_tel'], 'Pelanggan');
                    return;
                } else if (page === 'transaksi') {
                     await app.renderTable('sales', container, ['id_transaksi', 'tanggal', 'pelanggan', 'nett', 'status'], 'Riwayat Penjualan');
                     return;
                } else if (page === 'pembelian') {
                    html = app.forms.pembelian();
                } else if (page === 'setting') {
                    html = app.forms.setting();
                } else {
                    html = `<div class="p-4 text-center text-gray-500">Fitur ${page} sedang dalam pengembangan mode lite.</div>`;
                }
                
                container.innerHTML = html;
                lucide.createIcons();
                app.attachFormListeners(page);
            },

            // --- FORMS GENERATORS ---
            forms: {
                penjualan: () => `
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="p-scan" placeholder="Scan Barcode / SKU" class="input-field p-2 rounded-lg col-span-2">
                            <select id="p-customer" class="input-field p-2 rounded-lg col-span-2"><option>Pilih Pelanggan</option></select>
                            <select id="p-status" class="input-field p-2 rounded-lg"><option value="cod">COD</option><option value="transfer">Transfer</option><option value="qris">QRIS</option><option value="belum bayar">Belum Bayar</option></select>
                            <select id="p-sales" class="input-field p-2 rounded-lg"><option value="${state.user.nama}">${state.user.nama}</option></select>
                        </div>
                        <div id="cart-items" class="space-y-2 bg-white/50 p-2 rounded-lg min-h-[100px]"></div>
                        <div class="border-t pt-2 space-y-1 text-sm">
                            <div class="flex justify-between"><span>Total:</span><span id="cart-total" class="font-bold">Rp 0</span></div>
                        </div>
                        <button onclick="app.submitSale()" class="btn-primary w-full py-3 rounded-xl font-bold">SIMPAN & CETAK</button>
                    </div>
                `,
                produk: () => `
                    <div class="space-y-3">
                        <input type="text" id="prod-sku" placeholder="SKU" class="input-field w-full p-2 rounded-lg">
                        <input type="text" id="prod-nama" placeholder="Nama Barang" class="input-field w-full p-2 rounded-lg">
                        <input type="number" id="prod-modal" placeholder="Harga Modal" class="input-field w-full p-2 rounded-lg">
                        <input type="number" id="prod-jual" placeholder="Harga Jual" class="input-field w-full p-2 rounded-lg">
                        <button onclick="app.saveProduct()" class="btn-primary w-full py-2 rounded-lg">SIMPAN PRODUK</button>
                    </div>
                `,
                pelanggan: () => `
                    <div class="space-y-3">
                        <input type="text" id="cust-nama" placeholder="Nama Pelanggan" class="input-field w-full p-2 rounded-lg">
                        <input type="text" id="cust-alamat" placeholder="Alamat" class="input-field w-full p-2 rounded-lg">
                        <input type="text" id="cust-tel" placeholder="No Telepon" class="input-field w-full p-2 rounded-lg">
                        <button onclick="app.saveCustomer()" class="btn-primary w-full py-2 rounded-lg">SIMPAN PELANGGAN</button>
                    </div>
                `,
                pembelian: () => `
                    <div class="space-y-3">
                         <p class="text-sm text-gray-500">Fitur Pembelian (Driver Only)</p>
                         <input type="text" id="buy-sku" placeholder="Scan/Input SKU" class="input-field w-full p-2 rounded-lg">
                         <input type="number" id="buy-qty" placeholder="Qty" class="input-field w-full p-2 rounded-lg">
                         <input type="number" id="buy-harga" placeholder="Harga Beli" class="input-field w-full p-2 rounded-lg">
                         <button onclick="app.submitPurchase()" class="btn-primary w-full py-2 rounded-lg">SIMPAN PEMBELIAN</button>
                    </div>
                `,
                setting: () => `
                    <div class="space-y-3">
                        <label class="block text-sm font-bold">Google Sheets ID</label>
                        <input type="text" id="set-sheet-id" value="${CONFIG.sheetsId}" class="input-field w-full p-2 rounded-lg">
                        <label class="block text-sm font-bold">GAS URL</label>
                        <input type="text" id="set-gas-url" value="${CONFIG.gasUrl}" class="input-field w-full p-2 rounded-lg">
                        <button onclick="app.saveSettings()" class="btn-primary w-full py-2 rounded-lg">SIMPAN KONFIGURASI</button>
                        <button onclick="window.open('${CONFIG.gasUrl}', '_blank')" class="w-full py-2 border border-primary text-primary rounded-lg mt-2">Buka Google Sheets</button>
                    </div>
                `
            },

            // --- DATA HANDLING ---
            syncData: async () => {
                const loader = document.getElementById('loading');
                loader.classList.remove('hidden-page');
                
                try {
                    // Fetch Data from GAS
                    const res = await fetch(`${CONFIG.gasUrl}?action=getAllData`);
                    const json = await res.json();
                    
                    if (json.status === 'success') {
                        state.data = json.data;
                        app.updateDashboard();
                        app.populateDropdowns();
                        Swal.fire({ icon: 'success', title: 'Sinkronisasi Berhasil', timer: 1500, showConfirmButton: false });
                    } else {
                        throw new Error('Gagal ambil data');
                    }
                } catch (e) {
                    console.error(e);
                    // Fallback dummy data if offline/error for demo purposes so UI doesn't break
                    if(state.data.products.length === 0) {
                         state.data.products = [{sku:'BRG001', nama_barang:'Air Mineral', harga_jual:5000, harga_modal:4000}];
                    }
                    Swal.fire({ icon: 'warning', title: 'Mode Offline / Gagal Sync', text: 'Menggunakan data lokal sementara.' });
                } finally {
                    loader.classList.add('hidden-page');
                }
            },

            updateDashboard: () => {
                const today = new Date().toISOString().split('T')[0];
                const todaySales = state.data.sales.filter(s => s.tanggal.startsWith(today));
                const total = todaySales.reduce((acc, curr) => acc + parseFloat(curr.nett||0), 0);
                const pending = todaySales.filter(s => s.status === 'belum bayar').reduce((acc, curr) => acc + parseFloat(curr.nett||0), 0);
                
                document.getElementById('dash-total-sales').innerText = `Rp ${total.toLocaleString()}`;
                document.getElementById('dash-pending').innerText = `Rp ${pending.toLocaleString()}`;
            },

            populateDropdowns: () => {
                const custSelect = document.getElementById('p-customer');
                if(custSelect) {
                    custSelect.innerHTML = '<option value="Umum">Umum</option>';
                    state.data.customers.forEach(c => {
                        custSelect.innerHTML += `<option value="${c.nama}">${c.nama}</option>`;
                    });
                }
            },

            // --- SPECIFIC ACTIONS ---
            submitSale: async () => {
                if (state.cart.length === 0) return Swal.fire('Error', 'Keranjang kosong', 'warning');
                
                const customer = document.getElementById('p-customer').value;
                const status = document.getElementById('p-status').value;
                const total = state.cart.reduce((acc, item) => acc + (item.qty * item.harga), 0);
                
                const payload = {
                    action: 'saveSale',
                    id_transaksi: 'TRX-' + Date.now(),
                    tanggal: new Date().toISOString(),
                    pelanggan: customer,
                    sales: state.user.nama,
                    status: status,
                    items: state.cart,
                    gross: total,
                    disc: 0,
                    nett: total
                };

                await app.pushData(payload);
                state.cart = [];
                document.getElementById('cart-items').innerHTML = '';
                document.getElementById('cart-total').innerText = 'Rp 0';
                app.nav('dashboard');
            },

            saveProduct: async () => {
                const payload = {
                    action: 'saveProduct',
                    sku: document.getElementById('prod-sku').value,
                    nama_barang: document.getElementById('prod-nama').value,
                    harga_modal: document.getElementById('prod-modal').value,
                    harga_jual: document.getElementById('prod-jual').value
                };
                if(!payload.sku) return Swal.fire('Error', 'SKU Wajib diisi', 'warning');
                await app.pushData(payload);
                app.nav('produk'); // Refresh
            },

            saveCustomer: async () => {
                const payload = {
                    action: 'saveCustomer',
                    nama: document.getElementById('cust-nama').value,
                    alamat: document.getElementById('cust-alamat').value,
                    no_tel: document.getElementById('cust-tel').value
                };
                await app.pushData(payload);
                app.nav('pelanggan');
            },
            
            submitPurchase: async () => {
                 const payload = {
                    action: 'savePurchase',
                    id_pembelian: 'PUR-' + Date.now(),
                    tanggal: new Date().toISOString(),
                    driver: state.user.nama,
                    items: [{sku: document.getElementById('buy-sku').value, qty: parseInt(document.getElementById('buy-qty').value), harga: parseInt(document.getElementById('buy-harga').value)}],
                    total_modal_bersih: parseInt(document.getElementById('buy-qty').value) * parseInt(document.getElementById('buy-harga').value)
                };
                await app.pushData(payload);
                app.nav('dashboard');
            },

            pushData: async (payload) => {
                document.getElementById('loading').classList.remove('hidden-page');
                try {
                    // Use no-cors or standard depending on GAS setup. Standard POST with JSON usually works if GAS handles it.
                    const res = await fetch(CONFIG.gasUrl, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if(result.status === 'success') {
                        Swal.fire('Berhasil', 'Data tersimpan ke Google Sheets', 'success');
                        app.syncData(); // Refresh local state
                    } else {
                        throw new Error(result.message);
                    }
                } catch (e) {
                    Swal.fire('Gagal', 'Gagal menyimpan: ' + e.message, 'error');
                } finally {
                    document.getElementById('loading').classList.add('hidden-page');
                }
            },

            renderTable: async (sheetName, container, columns, title) => {
                const data = state.data[sheetName] || [];
                let html = `<div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-primary/10 text-primary"><tr>`;
                columns.forEach(col => html += `<th class="p-2">${col}</th>`);
                html += `</tr></thead><tbody>`;
                
                data.slice().reverse().forEach(row => {
                    html += `<tr class="border-b">`;
                    columns.forEach(col => html += `<td class="p-2">${row[col] || '-'}</td>`);
                    html += `</tr>`;
                });
                html += `</tbody></table></div>`;
                
                // Add Export Button
                html += `<button onclick="app.exportToExcel('${sheetName}')" class="mt-4 w-full py-2 bg-green-600 text-white rounded-lg flex items-center justify-center gap-2"><i data-lucide="download"></i> Export Excel</button>`;
                
                container.innerHTML = html;
                lucide.createIcons();
            },

            exportToExcel: (sheetName) => {
                const ws = XLSX.utils.json_to_sheet(state.data[sheetName]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, sheetName);
                XLSX.writeFile(wb, `TirtaKencana_${sheetName}_${new Date().toISOString().split('T')[0]}.xlsx`);
            },
            
            attachFormListeners: (page) => {
                if(page === 'penjualan') {
                    const scanInput = document.getElementById('p-scan');
                    scanInput.addEventListener('keypress', (e) => {
                        if(e.key === 'Enter') {
                            const sku = e.target.value;
                            const product = state.data.products.find(p => p.sku === sku);
                            if(product) {
                                state.cart.push({...product, qty: 1});
                                app.renderCart();
                                e.target.value = '';
                            } else {
                                Swal.fire('Tidak Ditemukan', 'Produk tidak ada', 'error');
                            }
                        }
                    });
                }
            },
            
            renderCart: () => {
                const container = document.getElementById('cart-items');
                container.innerHTML = '';
                let total = 0;
                state.cart.forEach((item, idx) => {
                    const subtotal = item.qty * item.harga_jual;
                    total += subtotal;
                    container.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 rounded shadow-sm">
                            <div>
                                <div class="font-bold text-sm">${item.nama_barang}</div>
                                <div class="text-xs text-gray-500">${item.qty} x Rp ${item.harga_jual}</div>
                            </div>
                            <button onclick="state.cart.splice(${idx},1); app.renderCart()" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `;
                });
                document.getElementById('cart-total').innerText = `Rp ${total.toLocaleString()}`;
                lucide.createIcons();
            }
        };

        // Start App
        app.init();
    </script>
</body>
</html>
